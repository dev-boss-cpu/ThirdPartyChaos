[unix_http_server]
file=/var/run/supervisor.sock

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:mock-saas]
command=python -m uvicorn mock_saas:app --host 0.0.0.0 --port 8090
directory=/app/sample-app
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/var/log/supervisor/mock-saas.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/mock-saas.log
stderr_logfile_maxbytes=10MB

[program:proxy]
command=python module1/start_proxy.py --port 8080
directory=/app
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/var/log/supervisor/proxy.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/proxy.log
stderr_logfile_maxbytes=10MB

[program:control-api]
command=python -m uvicorn module2.control_api:app --host 0.0.0.0 --port 9000
directory=/app
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/var/log/supervisor/control-api.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/control-api.log
stderr_logfile_maxbytes=10MB

[program:healer]
command=python module3/healer.py
directory=/app
autostart=true
autorestart=true
startretries=5
startsecs=3
stdout_logfile=/var/log/supervisor/healer.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/healer.log
stderr_logfile_maxbytes=10MB

[program:sample-app]
command=python -m uvicorn main:app --host 0.0.0.0 --port 3000
directory=/app/sample-app
environment=HTTP_PROXY="http://localhost:8080",MOCK_SAAS_URL="http://localhost:8090"
autostart=true
autorestart=true
startretries=10
startsecs=3
stdout_logfile=/var/log/supervisor/sample-app.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/sample-app.log
stderr_logfile_maxbytes=10MB
